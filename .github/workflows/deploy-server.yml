name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'packages/server/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-server.yml'

concurrency:
  group: deploy-server
  cancel-in-progress: false

env:
  PROJECT_ID: kontext-verify-sdk
  REGION: us-central1
  SERVICE: kontext-api
  REGISTRY: us-central1-docker.pkg.dev/kontext-verify-sdk/kontext-api

jobs:
  deploy:
    name: Build & Deploy
    if: github.repository == 'vinay-lgtm-code/kontext_verify'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Run database migrations
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
        run: |
          # Download Cloud SQL Auth Proxy
          curl -sLo cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

          # Start proxy in background
          ./cloud-sql-proxy "$PROJECT_ID:$REGION:kontext-db" --port 5433 &
          PROXY_PID=$!
          sleep 3

          # Run all migrations (idempotent — IF NOT EXISTS / ADD COLUMN IF NOT EXISTS)
          for f in packages/server/migrations/0*.sql; do
            echo "Running migration: $f"
            PGPASSWORD="$DB_PASSWORD" psql \
              -h 127.0.0.1 -p 5433 \
              -U "$DB_USER" \
              -d kontext \
              -f "$f" 2>&1 || true
          done

          kill $PROXY_PID || true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=${{ env.REGISTRY }}/server:${{ github.sha }}
          docker build -t $IMAGE -f Dockerfile .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/server:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080 --memory=512Mi --cpu=1 --min-instances=0 --max-instances=10 --add-cloudsql-instances=kontext-verify-sdk:us-central1:kontext-db
