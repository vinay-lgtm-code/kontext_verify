name: Release

on:
  # Manual release with explicit version
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.14.0)'
        required: true
        type: string

  # Scheduled weekly release: Fridays at 12 PM PST (20:00 UTC)
  schedule:
    - cron: '0 20 * * 5'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Scheduled weekly auto-release (patch bump, skip if nothing new)
  # ==========================================================================
  auto-release:
    name: Weekly Release
    if: github.event_name == 'schedule' && github.repository == 'vinay-lgtm-code/kontext_verify'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release is needed
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous tags — first release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "next_version=0.14.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if there are new commits since the last tag
          COMMIT_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
          echo "Commits since $LAST_TAG: $COMMIT_COUNT"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No new commits — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-bump: increment patch version from last tag
          CURRENT=$(echo "$LAST_TAG" | sed 's/^v//')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "Next version: $NEXT_VERSION"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.should_release == 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.should_release == 'true'
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        if: steps.check.outputs.should_release == 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Typecheck SDK
        if: steps.check.outputs.should_release == 'true'
        run: pnpm --filter kontext-sdk run typecheck

      - name: Run tests
        if: steps.check.outputs.should_release == 'true'
        run: |
          pnpm --filter kontext-sdk test
          pnpm --filter @kontext/server test

      - name: Build SDK
        if: steps.check.outputs.should_release == 'true'
        run: pnpm --filter kontext-sdk build

      - name: Build CLI
        if: steps.check.outputs.should_release == 'true'
        run: pnpm --filter @kontext-sdk/cli build

      - name: Build Python client
        if: steps.check.outputs.should_release == 'true'
        run: |
          pip install build
          cd packages/python-client
          python -m build

      - name: Generate changelogs
        if: steps.check.outputs.should_release == 'true'
        run: ./scripts/generate-changelog.sh ${{ steps.check.outputs.next_version }}

      - name: Bump SDK version
        if: steps.check.outputs.should_release == 'true'
        run: |
          cd packages/sdk
          npm version ${{ steps.check.outputs.next_version }} --no-git-tag-version

      - name: Bump CLI version
        if: steps.check.outputs.should_release == 'true'
        run: |
          cd packages/cli
          npm version ${{ steps.check.outputs.next_version }} --no-git-tag-version

      - name: Bump Python client version
        if: steps.check.outputs.should_release == 'true'
        run: |
          cd packages/python-client
          sed -i 's/^version = .*/version = "${{ steps.check.outputs.next_version }}"/' pyproject.toml

      - name: Commit, tag, and push
        if: steps.check.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md packages/sdk/package.json packages/cli/package.json packages/python-client/pyproject.toml
          git commit -m "release: v${{ steps.check.outputs.next_version }} (weekly)"
          git tag "v${{ steps.check.outputs.next_version }}"
          git push origin main --tags

      - name: Setup npm auth
        if: steps.check.outputs.should_release == 'true'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Publish SDK to npm
        if: steps.check.outputs.should_release == 'true'
        run: |
          cd packages/sdk
          npm publish --no-provenance --access public

      - name: Publish CLI to npm
        if: steps.check.outputs.should_release == 'true'
        continue-on-error: true
        run: |
          cd packages/cli
          npm publish --no-provenance --access public

      - name: Publish Python client to PyPI
        if: steps.check.outputs.should_release == 'true'
        continue-on-error: true
        run: |
          pip install twine
          cd packages/python-client
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.next_version }}
          name: v${{ steps.check.outputs.next_version }}
          body_path: CHANGELOG.md
          generate_release_notes: false

      - name: Upload internal changelog to GCS
        if: steps.check.outputs.should_release == 'true'
        continue-on-error: true
        run: |
          gcloud storage cp CHANGELOG-INTERNAL.md gs://kontext-internal-logs/changelogs/v${{ steps.check.outputs.next_version }}.md

      - name: Trigger website deploy
        if: steps.check.outputs.should_release == 'true'
        run: gh workflow run deploy-website.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Manual release with explicit version
  # ==========================================================================
  manual-release:
    name: Release v${{ inputs.version }}
    if: github.event_name == 'workflow_dispatch' && github.repository == 'vinay-lgtm-code/kontext_verify'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck SDK
        run: pnpm --filter kontext-sdk run typecheck

      - name: Run tests
        run: |
          pnpm --filter kontext-sdk test
          pnpm --filter @kontext/server test

      - name: Build SDK
        run: pnpm --filter kontext-sdk build

      - name: Build CLI
        run: pnpm --filter @kontext-sdk/cli build

      - name: Build Python client
        run: |
          pip install build
          cd packages/python-client
          python -m build

      - name: Generate changelogs
        run: ./scripts/generate-changelog.sh ${{ inputs.version }}

      - name: Bump SDK version
        run: |
          cd packages/sdk
          npm version ${{ inputs.version }} --no-git-tag-version

      - name: Bump CLI version
        run: |
          cd packages/cli
          npm version ${{ inputs.version }} --no-git-tag-version

      - name: Bump Python client version
        run: |
          cd packages/python-client
          sed -i 's/^version = .*/version = "${{ inputs.version }}"/' pyproject.toml

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md packages/sdk/package.json packages/cli/package.json packages/python-client/pyproject.toml
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main --tags

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Publish SDK to npm
        run: |
          cd packages/sdk
          npm publish --no-provenance --access public

      - name: Publish CLI to npm
        continue-on-error: true
        run: |
          cd packages/cli
          npm publish --no-provenance --access public

      - name: Publish Python client to PyPI
        continue-on-error: true
        run: |
          pip install twine
          cd packages/python-client
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body_path: CHANGELOG.md
          generate_release_notes: false

      - name: Upload internal changelog to GCS
        continue-on-error: true
        run: |
          gcloud storage cp CHANGELOG-INTERNAL.md gs://kontext-internal-logs/changelogs/v${{ inputs.version }}.md

      - name: Trigger website deploy
        run: gh workflow run deploy-website.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
