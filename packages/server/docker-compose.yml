services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kontext
      POSTGRES_USER: kontext
      POSTGRES_PASSWORD: kontext_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kontext"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
